      localedir:
        resp: diligent # ifdef'd out

    locals: {}
    return: {}

  OpenInFile:
    args:
      ipFN:
        resp: diligent

    locals: {}
    return: # hands off ownership of file handle
      resp: responsible
      start: [GOOD, NUL]
      destructor: fclose

  OpenOutFile:
    args:
      opFN:
        resp: diligent

    locals: {}
