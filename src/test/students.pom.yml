# students pom model

# Line 23 is problematic, as hello is a stack pointer, and would be erroneously freed on line 34.  You cannot assign a an irresponsible pointer to a responsible lvalue.

# Line 25 violates POM, as you are trying to send an irresponsible pointer path to free (chosen is irresponsible, so the path chosen->name is irresponsible, even though name is responsible).  Freeing this name gets you in trouble both on line 30 and on lines 33-36 where the freed name is used or freed a second time.

# students.c
Structs:
  Student:
    name:
      resp: responsible   # initialized and freed in main()
    major:
      resp: responsible   # initialized and freed in main()

Functions:
  main:
    args:
      argv:
        type: array
        resp: diligent
        max: argc
        start: [VALID]
        referent: diligent
    locals:
      hello:
        resp: diligent # always points to string literal
      students:
        type: array
        max: NUM_STUDENTS # 3
        referent:       # responsible pointers
          type: struct
          struct: Student
          resp: responsible
      chosen:
        resp: irresponsible    # points to a member of students. C-path violation on line 25
        mutable: true
    return: {}
