# swap pom model

# swap.c
Functions:
  swap:
    args:
      p:
        resp: producer
        referent:
          resp: irresponsible
          lifetime: ["*q"]
          # In theory, *p and *q should both be mutable or both be immutable
      q:
        resp: producer
        referent:
          resp: irresponsible
          lifetime: ["*p"]
    locals:
      t:
        resp: irresponsible
        mutable: false
    return: {}

  main:
    args:
      argv:
        type: array
        resp: diligent
        max: argc
        start: [VALID]
        referent: diligent
    locals:
      x:
        resp: responsible
      y:
        resp: responsible
      p:
        resp: irresponsible
        mutable: true
      q:
        resp: irresponsible
        mutable: true
    return: {}

  malloc_or_die:
    args: {}
    locals:
      ret:
        mutable: true
        resp: responsible
    return:
      resp: responsible
      end: [GOOD]
