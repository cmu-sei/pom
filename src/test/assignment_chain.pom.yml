# At the LLVM IR level, each double assignment behaves like:
#      temp = malloc(sizeof(int));
#      p1 = temp;
#      p2 = temp;
# It DOESN'T behave like:
#      p1 = malloc(sizeof(int));
#      p2 = p1;
#
# This is why it is ok to free p1 but not free p2
# On the LLVM-IR level p2 is the zombie since p1 gets responsibility.

