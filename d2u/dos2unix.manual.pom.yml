  # This only is defined for Windows (b/c clashes with POSIX dirname(1))
  dirname:
    args:
      path:
        resp: diligent
    locals:
      ptr:
        resp: irresponsible
        mutable: true

    return:
      resp: irresponsible
      start: [VALID]
      lifetime: [path]

  # This only is defined for Windows (b/c clashes with POSIX dirname(1))
  basename:
    args:
      path:
        resp: diligent
    locals:
      ptr:
        resp: irresponsible
        mutable: true

    return:
      resp: irresponsible
      start: [VALID]
      lifetime: [path]

# While dirname() and basename() are defined in common.c, they are
# ifdef'd out by the Redemption container.

# POSIX says: The dirname() function may modify the string pointed to
# by path, and may return a pointer to static storage that may then be
# overwritten by a subsequent call to dirname().  and says the same
# wrt basename().  So we can assume dirname() and basename() take &
# return valid irresponsible pointers, just like their sample
# implementations in common.c.

# NOTE: this function is preprocessed out in the build in the
# Redemption container, so it need not be included here.
  d2u_mktemp:
    args:
      template:
        resp: diligent

    locals:
      cpy1: # freed, dn points to it, but never used after free:
        resp: responsible
      cpy2: # freed, bn points to it, but never used after free:
        resp: responsible
      dn:
        resp: irresponsible
      bn:
        resp: irresponsible
      ptr:
        resp: irresponsible
        mutable: true
      fname_str:
        resp: responsible

    return:
      resp: responsible # temporary file name
      start: [GOOD, NUL]

# This code violates POM by assigning fname_str's value to fname_ret,
# which makes fname_str a zombie. Then they use fname_str on lines 993
# and 999. This code could comply with POM by s/fname_str/fname_ret/;
# in lines 993 and 999.
  MakeTempFileFrom:
    args:
      OutFN:
        resp: diligent
      fname_ret:
        resp: producer
        referent:
          resp: responsible
          start: [ZOMBIE, NUL]
          end: [GOOD, NUL]

    locals:
      cpy: # freed, dir relies on it, but not used after free:
        resp: responsible
      dir:
        resp: irresponsible # cpy & dir are the same
        mutable: true
      fname_str:
        resp: responsible # hands off ownership to fname_ret array)
      fp:
        resp: responsible
        destructor: fclose  # or d2u_fclose
      name:
        resp: responsible  # passes ptr to fname_ret

    return:
      resp: responsible
      start: [GOOD, NUL]
      destructor: fclose

# If lFN is a link, and realpath() or canonicalize_file_name() fail,
# they both return NULL, but the null check does not overrite *rFN. So
# if this function returns -1 as error, it leaves *rFN unchanged.

# If lFN is a link, then canonicalize_file_name() returns a
# responsible pointer. (So does realpath().) If good, it gets assigned
# to *rFN and then goes out of scope. Which means that *rFN must be
# responsible. Otherwise lFN is not a link, it gets directly assigned
# to *rFN.  This would mean either that *rFN is irresponsible (which
# contradicts lFN being a link) or that *rFN is responsible and lFN
# becomes a zombie. That is, lFN becomes a zombie only if it is not a
# symbolic link. So this function violates POM!

# A simple fix would be for *rFN to be responsible (zombie, NULL->good)
# and receive a clone of lFN, perhaps by using strdup(lFN) on line
# 1100 and 1102. (This would make lFN irresponsible.) This function is
# invoked only by ConvertNewFile(), which treats lFN as irresponsible
# and *rFN as responsible.
  ResolveSymbolicLink:
    args:
      lFN:
        resp: diligent
      rFN:
        resp: producer  # ZOMBIE ,  NUL -> GOOD ,  unchanged & error (return -1) !
        referent:
          resp: responsible
          start: [ZOMBIE, NUL]
          end: [GOOD]
      ipFlag:
        resp: diligent
      progname:
        resp: diligent
    locals:
      errstr:
        resp: irresponsible
      targetFN: # freed, rFN assigned to targetFN, but not in same control flow:
        resp: responsible
      rVal:
        resp: responsible  # gets return value of realpath, passes to rFN. targetFN becomes ZOMBIE.  But realpath() violates POM
    return: {}

  read_bom:
    args:
      f:
        resp: diligent
        start: [VALID, NUL]
      bomtype:
        resp: diligent # integer value

    locals: {}

    return:
      resp: irresponsible
