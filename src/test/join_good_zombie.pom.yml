Functions:
  main:
    args:
      argv:
        type: array
        resp: diligent
        max: argc
        start: [VALID]
        referent: diligent
    locals:
      p1:
        resp: responsible
      p2:
        resp: responsible
      q:
        resp: responsible
        # should be irresponsible, but is freed on line 16, so responsible.
        # unifying if/else clauses on line 14 should have both p1/p2 be GOOD|NULL|ZOMBIE
        # making tricky to free correctly.
        # The SA POM verifier can't confirm this code is memory safe, because q aliases with p1 or p2.
        # But a SAT solver could work.
    return: {}
