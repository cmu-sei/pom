# dos2unix.c

# The unix2dos.c file appears to be the same as dos2unix.c. main() is
# the same wrt POM and the other functions all use irresponsible
# pointers.

# StripDeliminterW and ConvertDosToUnixW are identical
  StripDelimiter:
    args:
      ipInF:
        resp: diligent
      ipOutF:
        resp: diligent
      ipFlag:
        resp: diligent
      converted:
        resp: diligent
      progname:
        resp: diligent

    locals: {}
    return: {}

  ConvertDosToUnix:
    args:
      ipInF:
        resp: diligent
      ipOutF:
        resp: diligent
      ipFlag:
        resp: diligent
      progname:
        resp: diligent
    locals:
      ConvTable:
        resp: irresponsible
        mutable: true
    return: {}

# argv_new is responsible in the D2U_UNIFILE configuration, but never
# freed (memory leak!)
# argv_new is irresponsible in the other configuration.
  main:
    args:
      argv:
        type: array
        resp: diligent
        max: argc
        referent: diligent
    locals:
      pFlag:
        resp: responsible
      ptr:
        resp: irresponsible
      argv_new:
        type: array
        resp: diligent  # responsible on Windows
        max: argc_new
        referent: diligent  # responsible on Windows
      argv_glob:
        resp: diligent # unused on Linux
        # For Windows:
        # resp: responsible
        # referent:
        #   type: array
        #   max: argc_new
        #   referent: responsible
      localedir:
        resp: irresponsible # stack
        mutable: true
      progname:
        resp: irresponsible # stack
        mutable: true
      wargv:
        resp: diligent # unused on Linux
    return: {}

# querycp.c
  query_con_codepage:
    args: {}
    locals: {}
    return: {}

# unix2dos.c

  AddExtraDOSNewLine: # AddExtraDOSNewLineW is similar
