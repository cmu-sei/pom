Functions:

  atoi:
    args:
      nptr:
        arg_idx: 0
        resp: diligent
    return: {}
    signature: int atoi(const char *nptr);

  malloc:
    args: {}
    return:
      destructor: free
      resp: responsible
      start:
      - GOOD
      - NUL
    signature: void *malloc(size_t size)

  calloc:
    args: {}
    return:
      destructor: free
      resp: responsible
      start:
      - GOOD
      - NUL
    signature: void *calloc(size_t n, size_t size)

  realloc:
    args:
      ptr:
        arg_idx: 0
        destructor: free
        resp: responsible
        start:
        - GOOD
        - NUL
    return:
      destructor: free
      resp: responsible
      start:
      - GOOD
      - NUL
    signature: void *realloc(void *ptr, size_t size)

  free:
    args:
      ptr:
        arg_idx: 0
        destructor: free
        end:
        - ZOMBIE
        - NUL
        resp: responsible
        start:
        - NUL
        - GOOD
    return: {}
    signature: void free(void *_Nullable p)

  strdup:
    args:
      s:
        arg_idx: 0
        resp: diligent
    return:
      resp: responsible
      start:
      - GOOD
      - NUL
    signature: char *strdup(const char *s)

  strlen:
    args:
      s:
        arg_idx: 0
        resp: diligent
    return: {}
    signature: size_t strlen(const char *s)

  strcpy:
    args:
      dest:
        arg_idx: 0
        end:
        - VALID
        mutable: true
        resp: irresponsible
        start:
        - VALID
      src:
        arg_idx: 1
        resp: diligent
    return:
      lifetime: [dest]
      resp: irresponsible
      start:
      - VALID
    signature: char *strcpy(char *dest, const char *src)

  strncpy:
    args:
      dest:
        arg_idx: 0
        end:
        - VALID
        mutable: true
        resp: irresponsible
        start:
        - VALID
      src:
        arg_idx: 1
        resp: diligent
    return:
      lifetime: [dest]
      resp: irresponsible
      start:
      - VALID
    signature: char *strncpy(char *dest, const char *src, size_t n)

  strcmp:
    args:
      s1:
        arg_idx: 0
        resp: diligent
      s2:
        arg_idx: 1
        resp: diligent
    return: {}
    signature: int strcmp(const char *s1, const char *s2)

  strtok:
    args:
      str:
        arg_idx: 0
        end:
        - VALID
        mutable: true
        resp: irresponsible
        start:
        - VALID
      delim:
        arg_idx: 1
        resp: diligent
    return:
      lifetime: [str]
      resp: irresponsible
      start:
      - VALID
    signature: char *strtok(char *_Nullable restrict str, const char *restrict delim)

  fopen:
    args:
      mode:
        arg_idx: 1
        resp: diligent
      path:
        arg_idx: 0
        resp: diligent
    return:
      destructor: fclose
      resp: responsible
      start:
      - NUL
    signature: FILE *fopen(const char *path, const char *mode)

  fclose:
    args:
      stream:
        arg_idx: 0
        destructor: fclose
        end:
        - ZOMBIE
        resp: responsible
        start:
        - GOOD
    return: {}
    signature: int fclose(FILE *stream)

  puts:
    args:
      s:
        arg_idx: 0
        resp: diligent
        start:
        - VALID
    return: {}
    signature: int puts(const char *s)

  fgets:
    args:
      s:
        arg_idx: 0
        resp: irresponsible
        mutable: true
        start:
        - VALID
      stream:
        arg_idx: 2
        resp: diligent
        start:
        - VALID
    return:
      lifetime: [s]
      resp: irresponsible
      start:
      - VALID
    signature: char *fgets(char *s, int size, FILE *stream)

  fprintf:
    args:
      format:
        arg_idx: 1
        resp: diligent
        start:
        - VALID
      stream:
        arg_idx: 0
        resp: diligent
        start:
        - VALID
    return: {}
    signature: int fprintf(FILE *restrict stream, const char *restrict format, ...)

  printf:
    args:
      format:
        arg_idx: 0
        resp: diligent
        start:
        - VALID
      "var-args":
        resp: diligent
    return: {}
    signature: int printf(const char *restrict format, ...)

  snprintf:
    args:
      format:
        arg_idx: 2
        resp: diligent
        start:
        - VALID
      str:
        arg_idx: 0
        resp: diligent
        start:
        - NUL
        - VALID
    return: {}
    signature: int snprintf(size_t size; char str[restrict size], size_t size, const char *restrict format, ...)

  abort:
    args: {}
    return: {}
    signature: void abort(void)

  exit:
    args: {}
    return: {}
    signature: void exit(int status)
