Structs:
  node_s:
    data:
      resp: irresponsible
      start: [VALID, NUL]
    next:
      resp: responsible
      start: [GOOD, NUL]

  queue:
    head:
      resp: responsible
      start: [GOOD, NUL]
    tail:
      resp: irresponsible
      mutable: true
      start: [VALID, NUL] # but breaks POM
      lifetime: [queue]


Functions:
  new_queue:
    args:

  push:
    args:
      queue:
        resp: producer
      new_data:
        resp: responsible
        start: [GOOD]
        end: [ZOMBIE]
    locals:
      new_node:
        resp: responsible

  pop:
    args:
      queue:
        resp: producer
    locals:
      popped:
        resp: responsible
      result:
        resp: irresponsible
      new_head:
        resp: responsible
    return:
        resp: irresponsible
        start: [VALID, NUL]

  peek:
    args:
      queue:
        resp: producer
    return:
      resp: irresponsible
      start: [VALID, NUL]
      lifetime: [queue]

  erase:
    args:
      queue:
        resp: producer
    locals:
      node:
        resp: responsible
      next:
        resp: responsible

  main:
    locals: {}
