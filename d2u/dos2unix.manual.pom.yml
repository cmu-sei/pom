    return: {}

# TargetFN should be responsible, But line 1513 violates TargetFN
# being responsible, by giving it ipOutFN (which is
# irresponsible). This could be fixed by:
#
# 1. Commenti out line 1513 (TargetFN must remain a zombie),
# 2. Add:
#     else {
#       TargetFN = strdup(ipOutFN);
#     }
# to line 1526
# 3. Make the freeing of TargetFN unconditional (remove the condition)

# Line 1515 says:
#     ResolveSymlinkResult = 0; /* indicates that TargetFN need not be freed */
# and further analysis shows that the comment is correct: the
# ResolveSymlinkResult flag does correctly indicate whether TargetFN
# should be freed.  So this code is currently memory-safe, but using a
# variable to keep track of whether TargetFN should be freed violates
# POM.
  ConvertNewFile:
    args:
      ipInFN:
        resp: diligent
      ipOutFN:
        resp: diligent
      ipFlag:
        resp: diligent
      progname:
        resp: diligent
      Convert:
        resp: diligent
      ConvertW:
        resp: diligent
    locals:
      InF:
        resp: responsible
        destructor: fclose
      TempF:
        resp: responsible
        destructor: fclose
      TempPath:
        resp: responsible
      errstr:
        resp: irresponsible
      TargetFN:
        resp: responsible
    return: {}

  ConvertToStdout:
    args:
      ipInFN:
        resp: diligent
      ipFlag:
        resp: diligent
      progname:
        resp: diligent
      Convert:
        resp: diligent
      ConvertW:
