    return: {}

# This function is preprocesed out (only defined in Windows)
  glob_warg: # common.c:505
    args:
      wargv:
        type: array
        max: argc
        resp: diligent # CommandLineToArgvW allocates prior to function call
      argv:
        resp: producer
        referent:
          type: array
          max: argc_glob + 1
          start: [ZOMBIE, NUL]
          end: [GOOD]
          referent: responsible
      ipFlag:
        resp: diligent # malloc called prior to function call
      progname:
        resp: diligent # on stack -- no allocation
    locals:
      warg:
        resp: irresponsible
        mutable: true
      # points to wargv[i]
      # points to a slice of allocated memory
      # does not own memory
      # the memory it points to isn't explicity owned within function
      path:
        resp: responsible  # _wcsdup calls malloc, owns pointer
      path_and_filename:
        resp: responsible  # calls malloc, owns pointer
      "ptr:514": # line number to disambiguate multiple vars named 'ptr':
        resp: irresponsible
        mutable: true
      # points to a character
      # does not own memory
      # points to a slice of memory owned by path
      arg:
        resp: responsible  # calls malloc
      argv_new: # calls malloc:
        type: array
        max: argc_glob+1  # expression
        resp: producer
        referent: responsible  # pointers
      errstr:
        resp: irresponsible  # pointer given by stdlib (strerror)
      hFind:
        resp: responsible  # file handle gives ownership to handle
      new_argv_new: # calls realloc:
        type: array
        max: argc_glob+1  # expression
        resp: producer
        referent: responsible  # pointers
    return: {}

  printBSDLicense:
    args: {}
    locals: {}
    return: {}

  is_dos2unix:
    args:
      progname:
        resp: diligent

    locals: {}
    return: {}

  PrintUsage:
