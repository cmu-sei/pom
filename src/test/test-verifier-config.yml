# Configuration file for testing the POM verifier

# The format for a test case is as follows:
# <test-name>:
#  pom: <path to pom file for C source file>
#  valid: <path to output file to compare validation output against>
# the test name must be unique, have no spaces, and follow the Python naming convention (lowercase with underscores / snakecase)
# when the test suite is run, it will search for the C source file that has the same basename as the valid property

