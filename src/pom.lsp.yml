# YAML schema for POM models, compatible with Language Server Protocol (LSP)

$schema: "http://json-schema.org/draft-07/schema#"
type: object
properties:
  Functions: # START: Functions property
  type: object
  additionalProperties: false
  patternProperties:
    ".*": # Matches any function name
      type: object
      properties:
        args: # START: args property
          type: array
          minItems: 0 # Allow empty args array
          items:
            required: ["name", "resp"] # Require name and resp for validation
            $ref: "#/definitions/pom-element" # Reference to pom-element definition
        locals: # START: locals property
          type: array
          minItems: 0 # Allow empty locals array
          items:
            required: ["name", "resp"] # Require name and resp for validation
            $ref: "#/definitions/pom-element" # Reference to pom-element definition
        return: # START: return property
          type: object
          $ref: "#/definitions/pom-element" # Reference to pom-element definition
definitions:
  responsibility: # Responsibility property
    type: string
    enum: ["responsible", "irresponsible", "out-of-scope", "diligent", "producer"]
  pointer-state: # Pointer state property
    type: array
    minItems: 1
    items:
      type: string
      enum: [GOOD, ZOMBIE, NUL, VALID, INVALID]
  pointer-type: # Pointer type property
    type: string
    enum: ["pointer", "array", "struct", "union"]
  destructor: # Destructor property
    type: string
    pattern: "^(free|fclose|.*)$"
  pom-element: # Recursive definition for the pom-element property
    oneOf:
      - $ref: "#/definitions/responsibility"
      - type: object
        properties:
          name:
            type: string
          resp:
            $ref: "#/definitions/responsibility" # Responsibility property
          start:
            $ref: "#/definitions/pointer-state" # Pointer state
          end:
            $ref: "#/definitions/pointer-state" # Pointer state
          destructor:
            $ref: "#/definitions/destructor" # Destructor property
          type:
            $ref: "#/definitions/pointer-type" # Pointer type
          # Conditional properties
          min:
            anyOf:
              - type: integer
              - type: string
          max:
            anyOf:
              - type: integer
              - type: string
          lifetime:
            anyOf:
              - type: integer
              - type: string
          mutable:
            - type: string
          # Referent can be recursive or a responsibility string
          referent:
            oneOf:
              - $ref: "#/definitions/pom-element"
              - $ref: "#/definitions/responsibility"
