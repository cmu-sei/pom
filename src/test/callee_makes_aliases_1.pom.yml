# callee_makes_aliases_1.c
Functions:
  foo:
    args:
      ppX:
        resp: producer
        referent:
          type: pointer
          resp: irresponsible
          mutable: true
      ppA:
        resp: producer
        referent:
          type: pointer
          resp: irresponsible
          # Not mutable, gets overwritten by *ppX.
          lifetime: ["*ppX"]
          # Ideally the POM verifier would holler that the function is not compliant without this lifetime property.
          # (eg the problem is lifetimes in this function, rather than the use-after-free in main()
          # Required b/c of  *ppA = *ppX assignment
    locals: {}
    return: {}

  main:
    args: {}
    locals:
      ppX:
        resp: responsible
        referent:
          type: pointer
          resp: responsible
          mutable: true
      ppA:
        resp: responsible
        referent:
          type: pointer
          resp: irresponsible
    return: {}
