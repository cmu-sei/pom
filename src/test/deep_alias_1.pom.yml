# deep_alias_1 pom model

# The intended model is that r[xyzw][123] are all responsible
# pointers, while x, y, z, w are irresponsible.

# Except for not confirming that malloc() never fails.  This code is
# memory safe. But it may have lifetime issues.

# deep_alias_1.c

# This code complies with 'strict provenance'
# (https://doc.rust-lang.org/std/ptr/index.html#strict-provenance)
# because while there are pointer-to-integer casts, there are no
# integer-to-pointer casts, which are a much bigger PITA.

Functions:
  malloc_or_die:
    args: {}
    locals:
      ret:
        mutable: true
        resp: responsible
    return:
      resp: responsible
      end: [GOOD]

  update_min_ptr:
    args:
      new_ptr:
        resp: diligent
        start: [VALID]
    locals: {}
    return: {}

  sub_min_ptr:
    args:
      ptr:
        resp: diligent
        start: [VALID]
    locals: {}
    return: {}


  triple_malloc:
    args:
      r1:
        resp: producer
        referent:
          resp: responsible
          start: [ZOMBIE, NUL]
          end: [GOOD]
          referent:
            resp: irresponsible
            mutable: true
            start: [INVALID]
            end: [VALID]
            referent:
              resp: irresponsible
              mutable: true
              start: [INVALID]
              end: [VALID]
              lifetime: ['*r3']
            lifetime: ['*r2']
        mutable: true
        start: [VALID]
      r2:
        resp: producer
        referent:
          resp: responsible
          start: [ZOMBIE, NUL]
          end: [GOOD]
          referent:
            resp: irresponsible
            mutable: true
            start: [INVALID]
            end: [VALID]
            lifetime: ['*r3']
        mutable: true
        start: [VALID]
      r3:
        resp: producer
        referent:
          resp: responsible
          start: [ZOMBIE, NUL]
          end: [GOOD]
        mutable: true
        start: [VALID]
    locals:
      ret:
        resp: irresponsible
        mutable: true
        lifetime: [r1]
        referent:
          resp: irresponsible
          mutable: true
          lifetime: [r2, r3]
          # We must worry about this lifetime, because it escapes the function
          # (so does ret, but we make an exception for return values)
          referent:
            resp: irresponsible
            mutable: true
    return:
      resp: irresponsible
      lifetime: ["*r1"]
      referent:
        resp: irresponsible
        lifetime: ["*r2"]
        referent:
          resp: irresponsible
          lifetime: ["*r3"]
          end: [VALID]
          mutable: true
        end: [VALID]
        mutable: true
      end: [VALID]
      mutable: true


  foo:
    args:
      x:
        resp: irresponsible
        mutable: true
        lifetime: [z]
        referent:
          resp: irresponsible
          mutable: true
          referent:
            resp: irresponsible
            mutable: true
            start: [VALID, NUL]
            end: [VALID, NUL]
          start: [VALID]
          end: [VALID]
          lifetime: ['*z']
        start: [VALID]
      y:
        resp: irresponsible
        mutable: true
        referent:
          resp: irresponsible
          mutable: true
          lifetime: ["*z"]
          referent:
            resp: irresponsible
            mutable: true
            start: [VALID, NUL]
            end: [VALID, NUL]
            lifetime: ['**z']
          start: [VALID]
          end: [VALID]
        start: [VALID]
      z:
        resp: irresponsible
        mutable: true
        referent:
          resp: irresponsible
          mutable: true
          referent:
            resp: irresponsible
            mutable: true
            start: [VALID]
            end: [VALID]
          start: [VALID]
          end: [VALID]
        start: [VALID]
      w:
        resp: irresponsible
        mutable: true
        referent:
          resp: irresponsible
          mutable: true
          referent:
            resp: irresponsible
            mutable: true
            start: [VALID]
            end: [VALID]
          start: [VALID]
          end: [VALID]
        start: [VALID]
    locals: {}
    return: {}


  print_ptr_chain:
    args:
      var:
        resp: diligent
        referent:
          resp: diligent
          referent:
            resp: diligent
            mutable: true
            start: [VALID]
            end: [VALID]
          start: [VALID, NUL]
          end: [VALID, NUL]
        start: [VALID]
      name:
        resp: diligent
        start: [VALID]
    locals: {}
    return: {}


  main:
    args: {}
    locals:
      rx1:
        resp: responsible
      rx2:
        resp: responsible
      rx3:
        resp: responsible
      ry1:
        resp: responsible
      ry2:
        resp: responsible
      ry3:
        resp: responsible
      rz1:
        resp: responsible
      rz2:
        resp: responsible
      rz3:
        resp: responsible
      rw1:
        resp: responsible
      rw2:
        resp: responsible
      rw3:
        resp: responsible
      x:
        resp: irresponsible
        mutable: true
        referent:
          resp: irresponsible
          mutable: true
          referent:
            resp: irresponsible
            mutable: true
      y:
        resp: irresponsible
        mutable: true
        referent:
          resp: irresponsible
          mutable: true
          referent:
            resp: irresponsible
            mutable: true
      z:
        resp: irresponsible
        mutable: true
        referent:
          resp: irresponsible
          mutable: true
          referent:
            resp: irresponsible
            mutable: true
      w:
        resp: irresponsible
        referent:
          resp: irresponsible
          referent:
            resp: irresponsible
        mutable: true

    return: {}
