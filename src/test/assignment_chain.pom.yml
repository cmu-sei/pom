Functions:
  main:
    args: {}
    locals:
      p1:
        resp: responsible
      p2:
        resp: responsible
    return: {}

  main2:
    args: {}
    locals:
      p1:
        resp: responsible
      p2:
        resp: responsible
    return: {}

  main3:  # double-free
    args: {}
    locals:
      p1:
        resp: responsible
      p2:
        resp: responsible
    return: {}

  main4: # leaks memory
    args: {}
    locals:
      p1:
        resp: responsible
      p2:
        resp: responsible
    return: {}
