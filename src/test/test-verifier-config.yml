tests:
  fn:
    pom: fn.pom.yml
    valid: fn.verifier.json
    expect: True
  fn_missing_funcs:
    pom: fn-missing-funcs.pom.yml
    valid: fn.verifier.json
    expect: False
  fn_missing_args:
    pom: fn-nested-missing-args.pom.yml
    valid: fn-nested.verifier.json
    expect: False
