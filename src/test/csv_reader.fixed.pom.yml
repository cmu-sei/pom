# csv_reader.fixed pom model.  Mostly identical to csv_reader model.

# csv_reader.c
Structs:
  csv_row:
    fields:
      type: array
      resp: responsible
      max: num_fields
      referent: responsible

  csv_table:
    rows:
      type: array
      resp: responsible
      max: num_rows


Functions:
  free_row:
    args:
      row:
        resp: producer   # not responsible, mustn't be freed
        start: [GOOD, NUL]
        referent: responsible
    locals: {}
    return: {}

  free_table:
    args:
      table:
        resp: responsible
        start: [GOOD, NUL]
        referent: responsible
    locals: {}
    return: {}

  parse_csv_row:
    args:
      row_str:
        resp: irresponsible
        mutable: true  # strcok() mutates its string
    locals:
      row:
        resp: responsible
      field_str:
        resp: irresponsible
    return:
        resp: responsible
        start: [GOOD, NUL]
        referent: responsible

  parse_csv_file:
    args:
      filename:
        resp: diligent
    locals:
      file:
        resp: responsible
        destructor: fclose
      table:
        resp: responsible
      row:
        resp: responsible
    return:
        resp: responsible
        start: [GOOD, NUL]
        referent: responsible

  main:
    args:
      argv:
        type: array
        resp: diligent
        max: argc
        start: [VALID]
        referent: diligent
    locals:
      table:
        resp: responsible
    return: {}
