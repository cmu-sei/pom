# dos2unix POM model (built by hand).
# dos2unix.sorted.pom.yml is a sorted version of this file. What the builder *should* give you


Functions:

# common.c
  d2u_strncpy:
    args:
      dest:
        resp: irresponsible
        mutable: true
        # dest is a valid ptr before AND after function
      src:
        resp: diligent

    locals: {}

    return:
      resp: irresponsible
      start: [VALID]
      lifetime: [dest]

  d2u_fclose:
    args:
      fp:
        resp: responsible
        start: [GOOD]
        end: [ZOMBIE]
        destructor: fclose
      filename:
        resp: diligent
      ipFlag:
        resp: diligent
      m:
        resp: diligent
      progname:
        resp: diligent

    locals: {}
    return: {}

  d2u_PrintLastError:
    args:
      progname:
        resp: diligent
    locals:
      lpMsgBuf:
        resp: responsible
        destructor: LocalFree
    return: {}

  d2u_WideCharToMultiByte:
    args:
      lpWideCharStr:
        resp: diligent
      lpMultiByteStr:
        resp: diligent
        start: [VALID, NUL]
      lpDefaultChar:
        resp: diligent
        start: [VALID, NUL]

    locals: {}
    return: {}

  d2u_MultiByteToWideChar:
    args:
      lpMultiByteStr:
        resp: diligent
      lpWideCharStr:
        resp: diligent
        start: [VALID, NUL]

    locals: {}
    return: {}

  d2u_utf8_fprintf:
